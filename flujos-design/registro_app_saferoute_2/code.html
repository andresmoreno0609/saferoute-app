<body class="font-body-lg text-on-surface">
<!-- TopAppBar -->
<header class="bg-[#F8FAFC] border-b border-slate-200 sticky top-0 z-50">
<div class="flex items-center justify-between px-5 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-100 transition-colors active:opacity-70">
<span class="material-symbols-outlined text-[#0F172A]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-black text-[#0F172A] tracking-tighter">SafeRoute</h1>
</div>
<div class="w-10"></div> <!-- Spacer for center-aligned feel -->
</div>
</header>
<main class="max-w-md mx-auto px-container-padding pt-base pb-xl">
<!-- Header Section -->
<section class="mt-md mb-lg">
<h2 class="font-h1 text-h1 text-[#0F172A] mb-xs">Crear Cuenta</h2>
<p class="font-body-lg text-body-lg text-slate-500">Únete a nuestra comunidad y garantiza la seguridad en cada trayecto.</p>
</section>
<!-- Role Selection -->
<section class="mb-lg">
<span class="font-label-caps text-label-caps text-slate-400 block mb-sm">SELECCIONA TU ROL</span>
<div class="grid grid-cols-2 gap-gutter">
<!-- Role Card: Parent -->
<label class="relative flex flex-col items-center justify-center p-md bg-white rounded-xl border-2 border-brand-teal ring-1 ring-brand-teal/20 shadow-[0_4px_20px_rgba(0,0,0,0.04)] cursor-pointer transition-all">
<input checked="" class="sr-only" name="role" type="radio"/>
<div class="w-12 h-12 bg-teal-50 rounded-full flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-brand-teal text-3xl" data-icon="family_history">family_history</span>
</div>
<span class="font-h3 text-body-sm text-[#0F172A] text-center">Soy Padre/Acudiente</span>
</label>
<!-- Role Card: Driver -->
<label class="relative flex flex-col items-center justify-center p-md bg-white rounded-xl border border-slate-200 shadow-[0_4px_20px_rgba(0,0,0,0.04)] cursor-pointer hover:border-brand-teal/50 transition-all">
<input class="sr-only" name="role" type="radio"/>
<div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-slate-400 text-3xl" data-icon="directions_car">directions_car</span>
</div>
<span class="font-h3 text-body-sm text-[#0F172A] text-center">Soy Conductor</span>
</label>
</div>
</section>
<!-- Form Section -->
<form class="space-y-md">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-slate-600 ml-1">NOMBRE COMPLETO</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" data-icon="person">person</span>
<input class="w-full h-12 pl-12 pr-4 bg-white border border-slate-200 rounded-xl focus:border-brand-teal focus:ring-1 focus:ring-brand-teal transition-all outline-none text-body-lg" placeholder="Ej. Juan Pérez" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-slate-600 ml-1">CORREO ELECTRÓNICO</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" data-icon="mail">mail</span>
<input class="w-full h-12 pl-12 pr-4 bg-white border border-slate-200 rounded-xl focus:border-brand-teal focus:ring-1 focus:ring-brand-teal transition-all outline-none text-body-lg" placeholder="nombre@email.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-slate-600 ml-1">CONTRASEÑA</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" data-icon="lock">lock</span>
<input class="w-full h-12 pl-12 pr-12 bg-white border border-slate-200 rounded-xl focus:border-brand-teal focus:ring-1 focus:ring-brand-teal transition-all outline-none text-body-lg" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-slate-600 ml-1">CONFIRMAR CONTRASEÑA</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" data-icon="verified_user">verified_user</span>
<input class="w-full h-12 pl-12 pr-4 bg-white border border-slate-200 rounded-xl focus:border-brand-teal focus:ring-1 focus:ring-brand-teal transition-all outline-none text-body-lg" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-sm pt-xs">
<div class="flex items-center h-6">
<input class="h-5 w-5 text-brand-teal border-slate-300 rounded focus:ring-brand-teal" id="terms" name="terms" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-slate-500" for="terms">
                    Acepto los <a class="text-brand-teal font-semibold hover:underline" href="#">términos y condiciones</a> de uso y la política de privacidad.
                </label>
</div>
<!-- CTA Button -->
<div class="pt-md">
<button class="w-full h-12 bg-brand-teal hover:bg-brand-teal-dark text-white font-h2 text-body-lg rounded-xl shadow-lg shadow-teal-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Crear Cuenta
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<footer class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-slate-500">
                ¿Ya tienes cuenta? 
                <a class="text-brand-teal font-bold ml-1 hover:underline active:opacity-70 transition-opacity" href="#">Inicia sesión</a>
</p>
</footer>
</main>
<!-- Bottom Navigation Spacer (For mobile aesthetics) -->
<div class="h-10"></div>
<!-- Decorative Illustration Card (Asymmetric Layout Element) -->
<div class="max-w-md mx-auto px-container-padding mb-xl">
<div class="relative w-full h-40 bg-slate-900 rounded-2xl overflow-hidden shadow-xl">
<img alt="SafeRoute Background" class="w-full h-full object-cover opacity-50" data-alt="A clean and modern corporate digital art piece showing a family walking safely towards a bright horizon. The scene is illuminated with soft teal and slate blue light, creating a feeling of absolute security and tranquility. The artistic style is minimalist with flat vectors and smooth gradients, emphasizing a protective and professional family-oriented safety service." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSosTUSzfqzl2mYM-fEJwi_ywi_EfaorHsTNRB0sfiIxUtqSA2-0_wx99bloA8hRqOXi4wDdK3HnGpaOcvcgZiWYDUped94-DkLlqbvDV6a447OUIF-_iD9vAfBj8_qkckgnjP978jZbKoc6YwwK8vJOpWuJK3nNJATRCLtdO3gs-dNNFnfIk_akAictu3MrgJd7DXMDrciyW-DYvjpwU6OLgUlhEbjmEqtQRAHG0IZBsXmqn1MJtuFX2XToJkxKAIdJV93U7fsEtk"/>
<div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4">
<p class="text-white font-h3 text-body-sm opacity-90 italic">"Tu tranquilidad es nuestra prioridad principal."</p>
</div>
</div>
</div>
