<div class="mb-sm bg-secondary-container p-sm rounded-xl text-on-secondary-container">
<span class="material-symbols-outlined text-[32px]" data-icon="security">security</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface mb-xs">SafeRoute</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Bienvenido de nuevo</p>
</header>
<section class="w-full bg-surface-container-lowest p-md rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] border border-slate-100/50">
<form class="space-y-md">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="email">Correo Electrónico</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline" data-icon="email">email</span>
<input class="w-full h-[48px] pl-lg pr-md border border-outline-variant rounded-lg bg-surface text-body-sm focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none" id="email" placeholder="correo@ejemplo.com" type="email"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="password">Contraseña</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline" data-icon="lock">lock</span>
<input class="w-full h-[48px] pl-lg pr-[48px] border border-outline-variant rounded-lg bg-surface text-body-sm focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none" id="password" placeholder="Ingresa tu contraseña" type="password"/>
<button class="absolute right-sm text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end pt-xs">
<a class="font-body-sm text-body-sm text-secondary font-medium hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="w-full h-[48px] bg-secondary text-on-secondary font-h3 text-h3 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-md" type="submit">
                    Iniciar Sesión
                </button>
</form>
</section>
<footer class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                ¿No tienes cuenta? 
                <a class="text-secondary font-semibold hover:underline" href="#">Regístrate</a>
</p>
</footer>
</main>
