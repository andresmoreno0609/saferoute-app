<!DOCTYPE html>

<html class="light" lang="es"><head>

                        "container-padding": "20px",
                        "base": "8px",
                        "lg": "40px",
                        "xs": "4px",
                        "md": "24px",
                        "gutter": "16px"

                    "fontFamily": {

                    "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7f9fb;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-sm text-on-surface">
<!-- TopAppBar -->
<nav class="bg-slate-50 flex items-center justify-between px-5 h-16 w-full docked full-width top-0 border-b border-slate-200 sticky z-50">
<div class="flex items-center gap-4">
<button class="transition-colors duration-200 ease-in-out hover:bg-slate-100 p-2 rounded-full">
<span class="material-symbols-outlined text-slate-900" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-sans text-lg font-semibold tracking-tight text-slate-900">Complete Profile</h1>
</div>
<div class="w-8"></div> <!-- Spacer for symmetry -->
</nav>
<main class="pb-24 max-w-md mx-auto">
<!-- Progress Indicator -->
<div class="px-container-padding py-6 bg-white shadow-[0_-4px_20px_rgba(0,0,0,0.04)] mb-gutter">
<div class="flex justify-between items-center mb-2">
<span class="font-label-caps text-secondary uppercase">Step 3 of 4</span>
<span class="font-label-caps text-on-surface-variant">75% Complete</span>
</div>
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-secondary w-3/4 rounded-full"></div>
</div>
</div>
<form class="px-container-padding space-y-gutter">
<!-- Section 1: Personal Info -->
<section class="bg-white p-md rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-secondary" data-icon="person">person</span>
<h2 class="font-h3 text-primary">Personal Info</h2>
</div>
<div class="space-y-4">
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">Document number</label>
<input class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="12345678-9" type="text"/>
</div>
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">Birth date</label>
<input class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" type="date"/>
</div>
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">Address</label>
<input class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="Calle Principal 123" type="text"/>
</div>
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">Phone</label>
<input class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="+56 9 1234 5678" type="tel"/>
</div>
</div>
</section>
<!-- Section 2: License Info -->
<section class="bg-white p-md rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-secondary" data-icon="badge">badge</span>
<h2 class="font-h3 text-primary">License Info</h2>
</div>
<div class="space-y-4">
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">License number</label>
<input class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="A-987654321" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">Category</label>
<select class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all appearance-none bg-white">
<option>Clase B</option>
<option>Clase A1</option>
<option>Clase A2</option>
</select>
</div>
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">Expiration date</label>
<input class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" type="date"/>
</div>
</div>
</div>
</section>
<!-- Section 3: Bank Info -->
<section class="bg-white p-md rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-secondary" data-icon="account_balance">account_balance</span>
<h2 class="font-h3 text-primary">Bank Info</h2>
</div>
<div class="space-y-4">
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">Bank name</label>
<select class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all appearance-none bg-white">
<option>Banco Estado</option>
<option>Banco Santander</option>
<option>Banco de Chile</option>
</select>
</div>
<div class="group">
<label class="block font-label-caps text-on-surface-variant mb-1">Account number</label>
<input class="w-full h-12 border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="0000000000" type="number"/>
</div>
</div>
</section>
<!-- Section 4: Documents -->
<section class="bg-white p-md rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-secondary" data-icon="cloud_upload">cloud_upload</span>
<h2 class="font-h3 text-primary">Documents</h2>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- License Photo -->
<div class="space-y-2">
<p class="font-label-caps text-on-surface-variant">License photo</p>
<div class="relative group cursor-pointer border-2 border-dashed border-outline-variant rounded-xl overflow-hidden aspect-[4/3] flex items-center justify-center bg-surface-container-low hover:bg-surface-container transition-colors">
<img class="absolute inset-0 w-full h-full object-cover opacity-60" data-alt="A clean, high-resolution close-up of a professional identification card lying on a minimalist light gray desk surface. The composition is bright and modern, reflecting the SafeRoute brand colors with subtle teal shadows. The background is a soft, out-of-focus home office setting with ample natural light, creating a sense of professional reliability and trust." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4ahdgaLa9HQ4MCH3dumoBG6e3R-H7lRpoEmkZMsjMEJSroeCdbInrsFe3mYjMe8aWxLcZgz4mT-XN75Z6N7rdt9mqExeG2okDXqOK4iWteJ16sMAR9X8Bi5-M7XbEjpnu_ENBodxMBjeNv9Czycw-hXoKDkgyY2CwE8M_Qo0AeJwUS-xqaxMRDhdJUrq9G4jRTA805YrBbY6HgvM6MAoUKTTqOrnV5c3ltl01ITdRbuBBEaEOS27N87Qz0hjPAgAxOzKZ7jqV-jRG"/>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="add_a_photo">add_a_photo</span>
<span class="text-[10px] mt-1 font-medium text-on-surface-variant">Change</span>
</div>
</div>
</div>
<!-- ID Photo -->
<div class="space-y-2">
<p class="font-label-caps text-on-surface-variant">ID photo</p>
<div class="relative group cursor-pointer border-2 border-dashed border-outline-variant rounded-xl overflow-hidden aspect-[4/3] flex items-center justify-center bg-surface-container-low hover:bg-surface-container transition-colors">
<img class="absolute inset-0 w-full h-full object-cover opacity-60" data-alt="A detailed, macro view of a government-issued identification document held by a person in a brightly lit, professional environment. The image emphasizes clarity and vigilance, with sharp focus on the document's security features. The lighting is balanced and high-key, maintaining a minimalist aesthetic that aligns with a safety-first corporate identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCy_3W7UWjWAW8GjotSngHP5BxWd2cO-9_ZLivq6SGLJTuZaqt4QlcnTemRbWef3kVZlEqU1sEPSVTj4tIZSMwvQrewPaYNiQLSdiPINoSCvKXCr_UEAFhfxwURm5JS1gK-zngqAaFnRpydXDy82VyO05Sa6qVUCcOksnoBEckGraxiRSQamp_kRpgKg9eL-yekfWyiGMI-PrpRlL-RTw81D34LIN7H8FYg2Ra6i-nd0fD2HhycjxuHsIPtf7KjM1gZnqO4zU6bh8jJ"/>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="add_a_photo">add_a_photo</span>
<span class="text-[10px] mt-1 font-medium text-on-surface-variant">Change</span>
</div>
</div>
</div>
</div>
</section>
</form>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 bg-white p-container-padding border-t border-slate-100 shadow-[0_-4px_20px_rgba(0,0,0,0.04)] max-w-md mx-auto z-50">
<button class="w-full h-12 bg-secondary text-white font-semibold rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Enviar para verificación</span>
<span class="material-symbols-outlined text-sm" data-icon="send">send</span>
</button>
</div>
</body></html>
