<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#6bd8cb",
                        "surface-dim": "#d8dadc",
                        "surface-variant": "#e0e3e5",
                        "surface-tint": "#565e74",
                        "surface-container-highest": "#e0e3e5",
                        "surface-container": "#eceef0",
                        "primary-fixed-dim": "#bec6e0",
                        "on-secondary-fixed": "#00201d",
                        "tertiary-fixed": "#d5e3fd",
                        "on-primary-fixed": "#131b2e",
                        "tertiary-container": "#0d1c2f",
                        "outline": "#76777d",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#b9c7e0",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#bec6e0",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "primary": "#000000",
                        "on-surface": "#191c1e",
                        "tertiary": "#000000",
                        "on-secondary-container": "#006f66",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#89f5e7",
                        "secondary-container": "#86f2e4",
                        "on-primary-fixed-variant": "#3f465c",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#dae2fd",
                        "on-surface-variant": "#45464d",
                        "on-error": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "on-primary-container": "#7c839b",
                        "on-secondary-fixed-variant": "#005049",
                        "surface": "#f7f9fb",
                        "error": "#ba1a1a",
                        "outline-variant": "#c6c6cd",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#3a485c",
                        "on-tertiary-container": "#76859b",
                        "surface-container-low": "#f2f4f6",
                        "background": "#f7f9fb",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary-fixed": "#0d1c2f",
                        "primary-container": "#131b2e",
                        "secondary": "#006a61",
                        "on-background": "#191c1e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "gutter": "16px",
                        "xl": "64px",
                        "sm": "12px",
                        "md": "24px",
                        "lg": "40px",
                        "container-padding": "20px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-lg": ["Inter"],
                        "h3": ["Inter"],
                        "body-sm": ["Inter"],
                        "h2": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "h3": ["18px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col items-center">
<!-- Top Navigation Anchor (Suppressed in transactional but here for brand identity) -->
<header class="fixed top-0 w-full z-50 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-[0px_4px_20px_rgba(0,0,0,0.04)] flex items-center justify-between px-5 h-16">
<div class="text-lg font-bold text-slate-900 dark:text-white flex items-center gap-2 font-inter antialiased tracking-tight">
<span class="material-symbols-outlined text-teal-600" data-icon="shield">shield</span>
<span>Escolta Escolar</span>
</div>
<button class="text-slate-500 dark:text-slate-400 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<main class="flex-1 w-full max-w-md px-container-padding pt-24 pb-12 flex flex-col justify-center">
<!-- Header Section -->
<div class="mb-lg">
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Crear Cuenta</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Únete a la red de transporte más segura</p>
</div>
<!-- Account Type Selector -->
<div class="grid grid-cols-2 gap-gutter mb-lg">
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="account_type" type="radio"/>
<div class="flex flex-col items-center justify-center p-md bg-surface-container-lowest border border-outline-variant rounded-xl transition-all peer-checked:border-secondary peer-checked:bg-secondary-container peer-checked:ring-1 peer-checked:ring-secondary group-hover:border-secondary-fixed-dim shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-secondary text-[32px] mb-base" data-icon="family_restroom">family_restroom</span>
<span class="font-label-caps text-label-caps text-center text-on-surface">Soy Padre/Acudiente</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="account_type" type="radio"/>
<div class="flex flex-col items-center justify-center p-md bg-surface-container-lowest border border-outline-variant rounded-xl transition-all peer-checked:border-secondary peer-checked:bg-secondary-container peer-checked:ring-1 peer-checked:ring-secondary group-hover:border-secondary-fixed-dim shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-secondary text-[32px] mb-base" data-icon="directions_bus">directions_bus</span>
<span class="font-label-caps text-label-caps text-center text-on-surface">Soy Conductor</span>
</div>
</label>
</div>
<!-- Registration Form -->
<form class="space-y-gutter">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">Nombre completo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-sm text-body-sm text-on-surface" placeholder="Ej: Juan Pérez" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-sm text-body-sm text-on-surface" placeholder="correo@ejemplo.com" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-sm text-body-sm text-on-surface" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">Confirmar Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock_reset">lock_reset</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-sm text-body-sm text-on-surface" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<div class="flex items-center gap-sm py-xs">
<input class="w-5 h-5 rounded border-outline-variant text-secondary focus:ring-secondary bg-surface-container-lowest" id="terms" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="terms">
                    Acepto los <span class="text-secondary font-semibold underline underline-offset-4">términos y condiciones</span>
</label>
</div>
<button class="w-full h-[48px] bg-secondary text-on-secondary font-h3 text-h3 rounded-xl shadow-lg shadow-secondary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Crear Cuenta</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Text -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                ¿Ya tienes cuenta? 
                <a class="text-secondary font-bold hover:underline underline-offset-4 ml-1" href="#">Inicia sesión</a>
</p>
</div>
<!-- Visual Decorative Element (Modern Corporate Asymmetry) -->
<div class="mt-xl opacity-20 pointer-events-none select-none">
<div class="relative h-24 overflow-hidden rounded-2xl">
<img class="w-full h-full object-cover grayscale blur-[1px]" data-alt="A safe and modern residential neighborhood during a bright morning, with clear blue skies and soft sunlight reflecting off clean glass surfaces. The scene is framed with architectural precision to evoke a sense of professional security and community well-being, using a palette of soft slates and whites that matches the modern corporate interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDJMFMeEVHg1xWIhBIKVoi1VwYryqjt8p-8IXJItibg4XnXJUp6BN7vw96_weUt-nP-8SbRNXZTUBzggKs-ep_61z5jpApej9QYXX0Q0iSIH1uQB2V8QyDLvNH_0oM1o5_Xhjv9YogCZSxRbnUdLdSmck1gnl9_zVYIEUVq-Qc2YIDYFvERR65Oa1c8fSAP2_lJQmD2r9S137jNabapDsRfvBvMxxE55J06js803i92xfDW_ycTVL23RGHp2BYMsdimUv3l9T_3Ees"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
</div>
</div>
</main>
<!-- Bottom Nav is suppressed as per transaction/focused task rules -->
</body></html>
