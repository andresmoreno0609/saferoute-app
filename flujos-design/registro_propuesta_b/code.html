        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #14b8a6 0%, #27aef3 100%);
        }
        .glass-panel {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.85);
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-bright text-on-surface font-body-md min-h-screen">
<!-- TopAppBar from JSON -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-slate-50 border-b border-slate-200 shadow-sm">
<div class="flex items-center gap-4">
<button class="p-2 text-teal-600 hover:bg-slate-100 transition-colors active:scale-95 duration-150 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<h1 class="text-2xl font-black text-teal-600 tracking-tighter">SafeRide</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="pt-24 pb-12 px-margin max-w-lg mx-auto">
<!-- Hero Section -->
<div class="mb-lg text-center">
<div class="w-24 h-24 mx-auto mb-md rounded-3xl overflow-hidden shadow-lg border-4 border-white">
<img class="w-full h-full object-cover" data-alt="A warm, high-quality portrait of a smiling parent and child in a brightly lit car interior. The scene is filled with natural sunlight, creating a soft, safe, and welcoming atmosphere. The color palette features clean whites and vibrant teal accents in the background, matching a modern corporate aesthetic of reliability and care." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCR_rFn4ojJ-ZeUX3ts0MK2ZXCOUo7CTU4MTnG5fDLXUdHwGTaf4PQZcOzpJDKGbumkL6vSKEFSK_OWX-fDLtLzgB2bgO84sBjFCIyXDTHNTFnx_5-TbaNOTq8oC2-H7U07d_DkxWBt14F1joNSEMgbt6yRajrsDpcv1pLCJ3_nQKIvCctfJ-TK8brbt7-3VSacXlJrS_9CgixsiUKMlAu5OZ3hefhkn3hzFy4Dsn5SH9wAGtRFqvj-uYUQh_tkvUP57hdFddlTiX2z"/>
</div>
<h2 class="font-display text-display text-primary tracking-tight">Join SafeRide</h2>
<p class="font-body-md text-on-surface-variant mt-xs">Reliable transport for the ones you love most.</p>
</div>
<!-- Registration Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-lg shadow-[0_4px_12px_rgba(71,85,105,0.08)] border border-surface-container-high">
<form action="#" class="space-y-lg" method="POST">
<!-- Account Type Selector -->
<div>
<label class="font-label-md text-on-surface mb-md block">I am a...</label>
<div class="grid grid-cols-2 gap-sm">
<button class="group flex flex-col items-center justify-center p-lg rounded-xl border-2 border-primary bg-teal-50 text-teal-700 transition-all duration-200 active:scale-95" type="button">
<span class="material-symbols-outlined text-4xl mb-xs" style="font-variation-settings: 'FILL' 1;">family_restroom</span>
<span class="font-label-md">Parent</span>
</button>
<button class="group flex flex-col items-center justify-center p-lg rounded-xl border-2 border-outline-variant hover:border-primary-container hover:bg-surface-container transition-all duration-200 active:scale-95" type="button">
<span class="material-symbols-outlined text-4xl mb-xs text-on-surface-variant">directions_car</span>
<span class="font-label-md text-on-surface-variant">Driver</span>
</button>
</div>
</div>
<!-- Input Fields -->
<div class="space-y-md">
<div class="relative">
<label class="font-label-sm text-on-surface-variant mb-xs block" for="name">Full Name</label>
<div class="flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline">person</span>
<input class="w-full h-12 pl-11 pr-4 bg-surface rounded-lg border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none" id="name" name="name" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="relative">
<label class="font-label-sm text-on-surface-variant mb-xs block" for="email">Email Address</label>
<div class="flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline">mail</span>
<input class="w-full h-12 pl-11 pr-4 bg-surface rounded-lg border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none" id="email" name="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<div class="relative">
<label class="font-label-sm text-on-surface-variant mb-xs block" for="password">Password</label>
<div class="flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline">lock</span>
<input class="w-full h-12 pl-11 pr-11 bg-surface rounded-lg border border-outline-variant focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Terms & Privacy -->
<div class="flex items-start gap-xs">
<input class="mt-1 rounded text-primary focus:ring-primary border-outline-variant" id="terms" type="checkbox"/>
<label class="font-label-sm text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary font-bold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-bold hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="kinetic-gradient w-full h-xl text-white font-label-md rounded-xl shadow-lg shadow-primary-container/20 hover:shadow-primary-container/40 active:scale-[0.98] transition-all flex items-center justify-center gap-xs" type="submit">
                    Create Account
                    <span class="material-symbols-outlined">chevron_right</span>
</button>
</form>
</div>
<!-- Footer Links -->
<div class="mt-xl text-center">
<p class="font-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
<!-- Safety Badge -->
<div class="mt-xl flex items-center justify-center gap-md opacity-60">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest">End-to-End Encryption</span>
</div>
<div class="h-4 w-px bg-outline-variant"></div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">safety_check</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Background Checked</span>
</div>
</div>
</main>
<!-- Contextual FAB Suppression (Registration screen - no FAB) -->
<!-- Image for Visual Flourish -->
<div class="hidden lg:block fixed right-0 top-0 h-screen w-1/3 bg-surface-container overflow-hidden">
<img class="h-full w-full object-cover" data-alt="A clean, cinematic photograph of a safe suburban street during a golden hour sunset. A modern, white SUV is parked safely at the curb, symbolizing reliability and comfort. The lighting is warm and optimistic, with long soft shadows and a teal-tinted sky that aligns with the brand's sophisticated and family-oriented visual language." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2BiUGj90ha603mRPkf81hOsKI94s3Ewq7W418ZjQiT_-k5Xk-EpHZzEyXDsSHxKuJxvcd4NHsj0erq7PmMd4_vfMH9UL7HO9h6VNiokBcy_AZ3reVIJZIj5SHtaqIte2XS-Mg4zC0IFE4F7x0eD3TK_m2uVItvpeY_0X5m7fwDYfXW-lNwzSHcJTsOK1efkBDPt4y3w9D-tmOIV4yjTqmqFuGAVgfA_kkyte5_SAmIwrvcXUB85pZGsPngWNuF2IS0K3VPc6_qK3u"/>
<div class="absolute inset-0 bg-gradient-to-l from-transparent to-surface-bright/50"></div>
</div>
</body></html>
