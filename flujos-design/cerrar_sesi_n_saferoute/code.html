<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>

        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<script id="tailwind-config">

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-highest": "#e0e3e5",
                      "tertiary-container": "#0d1c2f",
                      "on-tertiary-fixed": "#0d1c2f",
                      "surface-container-low": "#f2f4f6",
                      "surface": "#f7f9fb",
                      "on-surface": "#191c1e",
                      "on-error": "#ffffff",
                      "background": "#f7f9fb",
                      "surface-variant": "#e0e3e5",
                      "secondary-container": "#86f2e4",
                      "on-secondary-fixed-variant": "#005049",
                      "on-primary-fixed-variant": "#3f465c",
                      "error": "#ba1a1a",
                      "on-secondary-fixed": "#00201d",
                      "on-error-container": "#93000a",
                      "surface-container-high": "#e6e8ea",
                      "on-tertiary": "#ffffff",
                      "on-surface-variant": "#45464d",
                      "outline": "#76777d",
                      "on-secondary-container": "#006f66",
                      "inverse-surface": "#2d3133",
                      "surface-bright": "#f7f9fb",
                      "inverse-primary": "#bec6e0",
                      "on-background": "#191c1e",
                      "primary-container": "#131b2e",
                      "surface-dim": "#d8dadc",
                      "surface-container-lowest": "#ffffff",
                      "primary": "#000000",
                      "tertiary-fixed": "#d5e3fd",
                      "secondary-fixed-dim": "#6bd8cb",
                      "primary-fixed": "#dae2fd",
                      "on-primary-fixed": "#131b2e",
                      "tertiary": "#000000",
                      "secondary": "#006a61",
                      "tertiary-fixed-dim": "#b9c7e0",
                      "surface-tint": "#565e74",
                      "on-tertiary-container": "#76859b",
                      "on-primary": "#ffffff",
                      "primary-fixed-dim": "#bec6e0",
                      "surface-container": "#eceef0",
                      "on-secondary": "#ffffff",
                      "inverse-on-surface": "#eff1f3",
                      "error-container": "#ffdad6",
                      "outline-variant": "#c6c6cd",
                      "on-tertiary-fixed-variant": "#3a485c",
                      "secondary-fixed": "#89f5e7",
                      "on-primary-container": "#7c839b"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-padding": "20px",
                      "base": "8px",
                      "xl": "64px",
                      "sm": "12px",
                      "gutter": "16px",
                      "xs": "4px",
                      "md": "24px",
                      "lg": "40px"
              },
              "fontFamily": {
                      "h1": ["Inter"],
                      "body-sm": ["Inter"],
                      "h2": ["Inter"],
                      "h3": ["Inter"],
                      "body-lg": ["Inter"],
                      "label-caps": ["Inter"]
              },
              "fontSize": {
                      "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                      "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "h3": ["18px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                      "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                      "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface min-h-screen flex flex-col font-body-lg text-on-surface">
<!-- Screen Content Underneath (Blurred Backdrop Context) -->
<main class="flex-grow flex flex-col items-center justify-center p-container-padding opacity-40 grayscale-[0.5] select-none">
<div class="w-full max-w-md bg-surface-container-lowest p-md rounded-xl shadow-sm space-y-md">
<div class="flex items-center gap-sm">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="person">person</span>
</div>
<div>
<p class="font-h3 text-h3 text-primary-container">Usuario Principal</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Cuenta Corporativa</p>
</div>
</div>
<div class="grid grid-cols-2 gap-gutter">
<div class="p-sm bg-surface-container-low rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-secondary block mb-xs" data-icon="shield">shield</span>
<p class="font-label-caps text-label-caps text-on-surface-variant">SEGURIDAD</p>
<p class="font-h3 text-h3">Activa</p>
</div>
<div class="p-sm bg-surface-container-low rounded-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-secondary block mb-xs" data-icon="analytics">analytics</span>
<p class="font-label-caps text-label-caps text-on-surface-variant">ACTIVIDAD</p>
<p class="font-h3 text-h3">84%</p>
</div>
</div>
<div class="aspect-video w-full rounded-xl overflow-hidden relative">
<img alt="Vista del Mapa" class="w-full h-full object-cover" data-alt="A professional high-angle map view of a modern city at dusk, featuring clean vector-style roads and soft teal traffic indicators. The lighting is low-key and sophisticated, emphasizing safety and surveillance themes with a minimalist aesthetic. The color palette consists of deep slate blues and vibrant teal accents, creating a sense of reliability and modern corporate precision." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDZju2QOb1cYyriA6ofGtYbSwQpiTnDBLSjDPzHYwlZ_IxnOwWsl1wfED5M5lrdij2PK6W96Td8Smem-ek4sczwi-b7PH7RO-s-u9qyBBES0HhS2Y935ekk0wO-vy93iXARDvEjxPfveUVZTkW9h6nOqltaY5z6GyB7Po0tees23oleXL7KSxsuJZUsoFj7OEraO57AyMXDI2B84R6PqVxnijnaeJjaFTK5REOarmOSa0sQUD3La-wJymvBHsqYdxynHVIkBhqZRpG"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary-container/40 to-transparent"></div>
</div>
</div>
</main>
<!-- Logout Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-container-padding bg-primary-container/40 backdrop-blur-sm">
<!-- Modal Card -->
<div class="bg-surface-container-lowest w-full max-w-sm rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.08)] overflow-hidden flex flex-col border border-outline-variant/20">
<!-- Modal Header / Icon Area -->
<div class="p-md pb-0 flex flex-col items-center text-center">
<div class="w-16 h-16 bg-error-container rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-error text-[32px]" data-icon="logout" style="font-variation-settings: 'FILL' 0;">logout</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface mb-xs">¿Cerrar sesión?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-sm">
                    ¿Estás seguro de que quieres salir de tu cuenta?
                </p>
</div>
<!-- Modal Actions -->
<div class="p-md pt-lg flex flex-col gap-gutter">
<!-- Destructive Logout Button -->
<button class="w-full h-[48px] bg-error hover:bg-error/90 text-on-error font-h3 text-h3 rounded-lg shadow-sm transition-all active:scale-[0.98] flex items-center justify-center">
                    Cerrar Sesión
                </button>
<!-- Cancel Button -->
<button class="w-full h-[48px] bg-transparent hover:bg-surface-container-high text-on-surface-variant font-h3 text-h3 rounded-lg border border-outline transition-all active:scale-[0.98] flex items-center justify-center">
                    Cancelar
                </button>
</div>
<!-- Design Branding Accent -->
<div class="h-1.5 w-full bg-gradient-to-r from-secondary to-tertiary-container/20"></div>
</div>
</div>
<!-- Background Navigation Skeleton (Suppressed but helps layout context) -->
<nav class="fixed bottom-0 w-full bg-white/80 border-t border-slate-200 px-4 py-3 flex justify-around items-center blur-sm pointer-events-none">
<div class="flex flex-col items-center text-slate-400">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[11px] font-medium">Inicio</span>
</div>
<div class="flex flex-col items-center text-slate-400">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="text-[11px] font-medium">Actividad</span>
</div>
<div class="flex flex-col items-center text-teal-600">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[11px] font-medium">Perfil</span>
</div>
</nav>
</body></html>
