<span class="text-xl font-black text-[#0F172A] dark:text-white font-['Inter'] tracking-tight">SafeRoute</span>

<div class="hidden md:flex gap-6 items-center">
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 px-3 py-2 rounded-lg cursor-pointer transition-all duration-200">Ayuda</span>

</div>
<h1 class="font-h1 text-h1 text-on-surface mb-2">Bienvenido de nuevo</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Ingresa a tu cuenta de SafeRoute</p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Correo electrónico</label>
<div class="relative group">
<input class="w-full h-[48px] px-4 border border-outline-variant rounded-lg bg-surface-bright focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all font-body-sm text-body-sm text-on-surface placeholder:text-outline" id="email" placeholder="correo@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Contraseña</label>
<a class="font-body-sm text-body-sm text-secondary hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<input class="w-full h-[48px] px-4 pr-12 border border-outline-variant rounded-lg bg-surface-bright focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all font-body-sm text-body-sm text-on-surface placeholder:text-outline" id="password" placeholder="Ingresa tu contraseña" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[48px] bg-secondary text-white rounded-lg font-h3 text-h3 flex items-center justify-center gap-2 hover:bg-[#005049] transition-all duration-200 active:scale-[0.98] shadow-md" type="submit">
                        Iniciar Sesión
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container-lowest px-2 text-on-surface-variant font-label-caps">O accede con</span>
</div>
</div>
<!-- Social/Quick Auth Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-11 border border-outline-variant rounded-lg font-body-sm text-body-sm text-on-surface hover:bg-surface-container-low transition-all">
