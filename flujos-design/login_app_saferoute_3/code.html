<body class="font-body-lg text-on-background min-h-screen flex items-center justify-center p-container-padding">
<main class="w-full max-w-md bg-white rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] p-md md:p-lg">
<!-- Header / Logo -->
<div class="flex flex-col items-center mb-lg">
<div class="w-16 h-16 bg-secondary-container flex items-center justify-center rounded-xl mb-md shadow-sm">
<span class="material-symbols-outlined text-secondary text-4xl" data-icon="shield">shield</span>
</div>
<h1 class="font-h1 text-h1 text-primary text-center mb-xs">Bienvenido de nuevo</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">Ingresa a tu cuenta de SafeRoute</p>
</div>
<!-- Form -->
<form class="space-y-md">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">mail</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-lg focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-sm" id="email" placeholder="correo@ejemplo.com" type="email"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">lock</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-lg focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-sm" id="password" placeholder="Ingresa tu contraseña" type="password"/>
</div>
</div>
<div class="flex justify-end">
<a class="font-body-sm text-body-sm text-secondary font-medium hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="w-full h-12 bg-secondary text-white font-h3 text-h3 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all shadow-md" type="submit">
                Iniciar Sesión
            </button>
</form>
<!-- Divider -->
<div class="relative my-lg flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-outline">O ACCEDE CON</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center gap-base h-12 border border-outline-variant rounded-lg font-body-sm text-on-surface hover:bg-surface-container transition-all active:scale-[0.98]">
<img alt="Google Logo" class="w-5 h-5" data-alt="The official Google 'G' icon rendered in its classic four colors: blue, red, yellow, and green. The logo is isolated against a clean, white minimalist background, maintaining a high-end corporate digital aesthetic with crisp edges and professional lighting typical of modern software interfaces." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7WocvLFtW67RmVUg2aCKH7Fzvp5oVY4LlHtXdgik9sf8XvKglU57yJwAkr1iprLyb7j13bWFvBc-WUhu8puc3lfTF-leToouMO4g3tIqMl1GukxSViD9rd3-zL9HW2fc9TjpRiOCr6K8peq88Eb-LOi71Oo89k2tRdSvN6fKcgi-oBXG_sCZ7mDyYyZTbvSuTklGG9DEZwi9V0xXsZef-1LIqw_2WBqPFJFuO1Mcud9yEODHWTo4GAUE7G__XRgwBvbbS_ElNFH2g"/>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-base h-12 border border-outline-variant rounded-lg font-body-sm text-on-surface hover:bg-surface-container transition-all active:scale-[0.98]">
<img alt="Apple Logo" class="w-5 h-5" data-alt="A sleek, minimalist Apple brand logo rendered in a deep matte black finish. The iconic bitten apple silhouette is presented centrally on a light grey, high-key studio background that emphasizes the modern corporate identity. The lighting is soft and directional, creating a premium, sophisticated tech aesthetic consistent with luxury hardware design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAIJKbb309601fKtE6wJTEx27i-AQmmlLKWiS76jwSMUwy61q1Bv0h2rYc1rXXWk0U8r90Y0-85neoQ2Yc-td7P9zBk1JOwdqITra01YuZYxbmnVaKIstLR-GfAIBZfLQ1Do74vMIQD5ed3AmmaJl9sqrmMcFqk44XygsDNavnBM2aXZBoknqN01A6OvTwFxQlaFFD642MwTrDJfDKTvqi69SdJuD7HMmvWL8bJ_dDMdnPiqxGF8Yn8BDWNhpaIq5EknqtM1qWkHmef"/>
<span>Apple</span>
</button>
</div>
<!-- Footer -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                ¿No tienes cuenta? 
                <a class="text-secondary font-semibold hover:underline ml-1 transition-all" href="#">Regístrate</a>
</p>
</div>
