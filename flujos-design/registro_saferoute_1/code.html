<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SafeRoute - Crear Cuenta</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#00201d",
                        "surface": "#f7f9fb",
                        "surface-dim": "#d8dadc",
                        "secondary-container": "#86f2e4",
                        "inverse-surface": "#2d3133",
                        "on-surface": "#191c1e",
                        "inverse-primary": "#bec6e0",
                        "on-secondary-container": "#006f66",
                        "tertiary-fixed": "#d5e3fd",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-container": "#0d1c2f",
                        "primary-container": "#131b2e",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary-fixed": "#0d1c2f",
                        "background": "#f7f9fb",
                        "on-primary-container": "#7c839b",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-fixed-variant": "#3a485c",
                        "tertiary-fixed-dim": "#b9c7e0",
                        "tertiary": "#000000",
                        "on-error-container": "#93000a",
                        "surface-tint": "#565e74",
                        "on-secondary-fixed-variant": "#005049",
                        "error": "#ba1a1a",
                        "outline-variant": "#c6c6cd",
                        "on-surface-variant": "#45464d",
                        "on-primary-fixed": "#131b2e",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary": "#006a61",
                        "primary-fixed-dim": "#bec6e0",
                        "on-tertiary-container": "#76859b",
                        "surface-bright": "#f7f9fb",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-highest": "#e0e3e5",
                        "on-secondary": "#ffffff",
                        "on-background": "#191c1e",
                        "surface-container": "#eceef0",
                        "primary": "#000000",
                        "outline": "#76777d",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#6bd8cb",
                        "primary-fixed": "#dae2fd",
                        "on-primary-fixed-variant": "#3f465c",
                        "secondary-fixed": "#89f5e7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "xs": "4px",
                        "xl": "64px",
                        "md": "24px",
                        "lg": "40px",
                        "base": "8px",
                        "sm": "12px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "h3": ["Inter"],
                        "h2": ["Inter"],
                        "label-caps": ["Inter"],
                        "h1": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["18px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                        "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-white border-b border-slate-100 shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-teal-600 text-2xl" data-icon="security">security</span>
<span class="text-xl font-bold text-slate-900">SafeRoute</span>
</div>
<button class="text-teal-600 font-semibold text-sm hover:bg-slate-50 px-4 py-2 rounded-lg transition-all active:scale-95">
            Sign In
        </button>
</header>
<main class="flex-grow flex items-center justify-center px-container-padding pt-24 pb-12">
<div class="w-full max-w-[480px] space-y-lg">
<!-- Hero Branding Section -->
<div class="text-center space-y-sm">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-secondary-container text-on-secondary-container mb-base">
<span class="material-symbols-outlined text-[32px]" data-icon="security">security</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface tracking-tight">Crear Cuenta</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Únete a SafeRoute</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant/30">
<form class="space-y-md">
<!-- Full Name Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Nombre Completo</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors" data-icon="person">person</span>
<input class="w-full h-[48px] pl-12 pr-4 bg-white border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline/60" placeholder="Tu nombre y apellido" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Correo Electrónico</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors" data-icon="email">email</span>
<input class="w-full h-[48px] pl-12 pr-4 bg-white border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline/60" placeholder="ejemplo@saferoute.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Contraseña</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-[48px] pl-12 pr-12 bg-white border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline/60" placeholder="Mínimo 8 caracteres" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1">Confirmar Contraseña</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-[48px] pl-12 pr-12 bg-white border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline/60" placeholder="Repite tu contraseña" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm pt-xs">
<div class="pt-0.5">
<input class="w-5 h-5 rounded border-outline-variant text-secondary focus:ring-secondary cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant select-none" for="terms">
                            Acepto los <span class="text-secondary font-semibold cursor-pointer hover:underline">términos y condiciones</span> y la política de privacidad.
                        </label>
</div>
<!-- Action Buttons -->
<div class="space-y-sm pt-base">
<button class="w-full h-[48px] bg-secondary text-on-secondary rounded-lg font-h3 text-h3 shadow-sm hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                            Crear Cuenta
                        </button>
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                                ¿Ya tienes cuenta? 
                                <a class="text-secondary font-semibold hover:underline px-xs" href="#">Inicia sesión</a>
</p>
</div>
</div>
</form>
</div>
<!-- Background Visual Decor (Subtle) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter opacity-40">
<div class="h-1 bg-gradient-to-r from-transparent via-secondary/20 to-transparent"></div>
<div class="h-1 bg-gradient-to-r from-transparent via-secondary/20 to-transparent"></div>
</div>
</div>
</main>
<!-- Footer Identity -->
<footer class="py-lg px-container-padding text-center">
<p class="font-label-caps text-label-caps text-outline uppercase tracking-widest">SafeRoute Ecosystem © 2024</p>
</footer>
<!-- Decorative Illustration Background (Abstract) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[5%] w-[400px] h-[400px] rounded-full bg-secondary-container/10 blur-3xl"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[350px] h-[350px] rounded-full bg-primary-fixed/10 blur-3xl"></div>
</div>
</body></html>
