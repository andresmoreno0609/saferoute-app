      min-height: max(884px, 100dvh);

<div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden border border-slate-200">

</div>
<h1 class="text-xl font-black text-teal-600 dark:text-teal-400 font-inter tracking-tight">Ruta Escolar</h1>
</div>
<button class="active:opacity-80 transition-opacity p-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-teal-600 dark:text-teal-400" data-icon="notifications">notifications</span>
</button>
</header>
<main class="pt-24 pb-32 px-container-padding max-w-2xl mx-auto">
<!-- Registration Card Container -->
<div class="space-y-gutter">
<!-- Success Toast (Initially Hidden or for visual confirmation display) -->
<div class="bg-secondary-container/30 border border-secondary text-on-secondary-container p-4 rounded-xl flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="font-h3 text-body-sm">Escaneo exitoso: Estudiante identificado</p>
</div>
<!-- Main Scan Result Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] overflow-hidden">
<!-- Status Header -->
<div class="bg-teal-600 px-6 py-4 flex justify-between items-center">
<span class="text-white font-label-caps tracking-widest">REGISTRAR EVENTO</span>
<span class="text-white/80 text-xs font-medium">Hace 2 seg.</span>
</div>
<div class="p-6 md:p-lg flex flex-col md:flex-row gap-6 items-center">

<div class="relative">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-2xl overflow-hidden border-4 border-white shadow-lg">
<img alt="Mateo Jiménez" class="w-full h-full object-cover" data-alt="A portrait of a cheerful young schoolboy named Mateo Jiménez with a bright, energetic expression. He is wearing a clean, modern school polo shirt. The background is a soft, high-key blur of a brightly lit classroom, maintaining a minimalist and corporate aesthetic that emphasizes the student's identity with clarity and composed professionalism." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAvPusVKr_OiOvZn7Fcib5WhNHBpXXW7uZ0gGFf0ZKfWUKVyoBf9CGM7jGW2RIZhEYP3PinDitvAfCaqGpI-vhU4AMmH5knEC4xeG-oFO7j-hgINgL5-hMUSses3Eo9tLh1OqPLDB0idi_lb6uu_NGKBrCfbpaTm4JP3davL0x-6J3reHNQLhWlCTGsG0p7e2rrHbgzqv9LPrkdLbW46jYfFx9hQ6MHqNaOij1fBzP60QAU9aMbEzGzx6271Z9nbIexUiJAY7KGnBkc"/>
</div>
<div class="absolute -bottom-2 -right-2 bg-secondary text-white p-2 rounded-lg shadow-md">
<span class="material-symbols-outlined text-[20px]" data-icon="verified_user">verified_user</span>
</div>
</div>
<!-- Student Info -->
<div class="text-center md:text-left flex-1">
<h2 class="font-h1 text-on-surface mb-1">Mateo Jiménez</h2>
<div class="flex flex-col gap-2">
<div class="flex items-center justify-center md:justify-start gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="school">school</span>
<span class="font-body-sm">3er Grado - Sección B</span>
</div>
<div class="flex items-center justify-center md:justify-start gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="location_on">location_on</span>
<span class="font-body-sm">Parada: Av. Central #452</span>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="px-6 pb-8 grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center gap-3 py-6 bg-white border-2 border-secondary/20 rounded-xl hover:bg-secondary/5 active:scale-[0.98] transition-all group">
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center text-secondary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px]" data-icon="login">login</span>
</div>
<span class="font-h3 text-secondary uppercase tracking-wider">Abordó</span>
</button>
<button class="flex flex-col items-center justify-center gap-3 py-6 bg-white border-2 border-outline-variant/30 rounded-xl hover:bg-surface-container-low active:scale-[0.98] transition-all group">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px]" data-icon="logout">logout</span>
</div>
<span class="font-h3 text-on-surface-variant uppercase tracking-wider">Bajó</span>
</button>
</div>
</div>

<div class="bg-white/50 backdrop-blur-sm border border-outline-variant/30 rounded-xl p-4">
<div class="flex items-center justify-between mb-3">
<span class="font-label-caps text-on-surface-variant">Últimos registros</span>
<button class="text-teal-600 text-xs font-bold">Ver todos</button>
</div>
<div class="space-y-3">
<div class="flex items-center gap-3 p-2 bg-white rounded-lg border border-slate-100">
<div class="w-8 h-8 rounded-full bg-secondary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-secondary" data-icon="login">login</span>
</div>
<div class="flex-1">
<p class="text-xs font-bold">Sofía Castro</p>
<p class="text-[10px] text-on-surface-variant">Abordó a las 07:12 AM</p>
</div>
<span class="material-symbols-outlined text-secondary text-[18px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
</div>

<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 py-1 px-3 active:scale-95 transition-all duration-200 hover:text-teal-500 dark:hover:text-teal-300">
<span class="material-symbols-outlined" data-icon="directions_bus">directions_bus</span>
<span class="font-inter text-[11px] font-medium">Ruta</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 py-1 px-3 active:scale-95 transition-all duration-200 hover:text-teal-500 dark:hover:text-teal-300">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-inter text-[11px] font-medium">Estudiantes</span>
</button>
<button class="flex flex-col items-center justify-center text-teal-600 dark:text-teal-400 bg-teal-50 dark:bg-teal-900/20 rounded-lg py-1 px-3 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="history" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-inter text-[11px] font-bold">Registro</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 py-1 px-3 active:scale-95 transition-all duration-200 hover:text-teal-500 dark:hover:text-teal-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-inter text-[11px] font-medium">Ajustes</span>
