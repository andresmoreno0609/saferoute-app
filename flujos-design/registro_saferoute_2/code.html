<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 shadow-sm dark:shadow-none docked full-width top-0 sticky z-50">
<div class="flex items-center px-4 h-16 w-full max-w-7xl mx-auto flex items-center px-4 h-16 w-full max-w-7xl mx-auto">
<button class="text-teal-600 dark:text-teal-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors active:scale-95 transition-transform duration-150 p-2 mr-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-sans antialiased font-semibold text-slate-900 dark:text-slate-50 text-lg">Create Account</h1>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-gutter">
<div class="w-full max-w-md">
<!-- Form Card -->
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<!-- Branding & Title -->
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center p-sm bg-secondary-container rounded-xl mb-md">
<span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h2 class="font-h2 text-h2 text-on-surface mb-xs">Crear Cuenta</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Únete a SafeRoute</p>
</div>
<form class="space-y-md">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Nombre Completo</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-sm text-on-surface" placeholder="Tu nombre y apellido" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Correo Electrónico</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="email">email</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-sm text-on-surface" placeholder="correo@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Contraseña</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-sm text-on-surface" placeholder="Mínimo 8 caracteres" type="password"/>
<button class="absolute right-4 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="eye">table_eye</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Confirmar Contraseña</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-sm text-on-surface" placeholder="Repite tu contraseña" type="password"/>
<button class="absolute right-4 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="eye">table_eye</span>
</button>
</div>
</div>
<!-- Terms -->
<label class="flex items-start gap-3 cursor-pointer group">
<div class="pt-0.5">
<input class="w-5 h-5 rounded border-outline-variant text-secondary focus:ring-secondary transition-all" type="checkbox"/>
</div>
<span class="font-body-sm text-on-surface-variant leading-relaxed">
                            Acepto los <span class="text-secondary font-semibold hover:underline">términos y condiciones</span> y la <span class="text-secondary font-semibold hover:underline">política de privacidad</span>.
                        </span>
</label>
<!-- Submit Button -->
<button class="w-full bg-secondary text-on-secondary font-h3 text-h3 h-12 rounded-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all duration-150 mt-md" type="submit">
                        Crear Cuenta
                    </button>
</form>
<!-- Footer Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-on-surface-variant">
                        ¿Ya tienes cuenta? 
                        <a class="text-secondary font-bold ml-1 hover:underline active:scale-95 transition-all inline-block" href="#">
                            Inicia sesión
                        </a>
</p>
</div>
</div>
<!-- Trust Badge (Contextual) -->
<div class="mt-md flex items-center justify-center gap-sm opacity-60 grayscale">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="font-label-caps text-[10px]">VERIFIED SECURITY</span>
</div>
<div class="w-px h-3 bg-outline-variant"></div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="encrypted">encrypted</span>
<span class="font-label-caps text-[10px]">END-TO-END ENCRYPTION</span>
</div>
</div>
</div>
</main>
<!-- Visual Background Element -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-full overflow-hidden opacity-10 pointer-events-none">

</div>
