<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            theme: {

                        "surface": "#f7f9fb",

                        "on-surface": "#191c1e",

                    "spacing": {
                        "md": "24px",
                        "base": "8px",
                        "xs": "4px",
                        "xl": "64px",
                        "lg": "40px",
                        "container-padding": "20px",
                        "sm": "12px",
                        "gutter": "16px"
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="docked full-width top-0 sticky z-40 backdrop-blur-md bg-slate-50/90 border-b border-slate-200 shadow-sm flex items-center justify-between px-5 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-teal-600" data-icon="school">school</span>
<span class="text-xl font-bold tracking-tight text-slate-900">SafeRoute</span>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 bg-secondary-container text-on-secondary-container rounded-full">
<span class="material-symbols-outlined text-[18px]" data-icon="sensors" style="font-variation-settings: 'FILL' 1;">sensors</span>
<span class="font-label-caps text-label-caps">EN VIVO</span>
</div>
</header>
<!-- Main Content Canvas: Map Layer -->
<main class="flex-grow relative h-0">
<!-- Interactive Map Mockup -->
<div class="absolute inset-0 bg-surface-container overflow-hidden">
<img class="w-full h-full object-cover grayscale-[20%] opacity-80" data-alt="A clean, minimalist high-angle map view showing an urban street grid with a bold teal navigation line tracing a route. The aesthetic is modern corporate, featuring soft gray buildings and light surfaces that minimize distraction. The lighting is bright and even, simulating a daylight drive with clear visibility for safety and professional navigation. Vibrant teal markers indicate pickup points along the route." data-location="Mexico City" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGHLAjJkfY_Jqs8kH_BxxHI_u7ReIDIZ3VFCU5PNMizCKv7YD-wjDQQSI-OpM7r9Aa5dvPKqK8aEkb_l3CRt2DMqXfLkt908J2w_HE32iOnMVmemwXIkbd6ceEUyq1efYASQaKt9_r_ZfTFPp-Wz79fNbcgEXIS9q3VfaUrppyBax8Qmh85UiodmSs137sQIcWUaFn1z3egK_cmyeV9vcDXLZUZfDFqsYSo6_ij4PbYjDRNiOwum8oaTqJD0RBYBtNegAKp9kCi1FI"/>
<!-- Route Markers and Overlays -->
<div class="absolute top-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-surface-container-lowest/90 backdrop-blur-lg rounded-xl p-4 shadow-sm border border-outline-variant flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-secondary rounded-full flex items-center justify-center text-white">
<span class="material-symbols-outlined" data-icon="turn_right" style="font-variation-settings: 'FILL' 1;">turn_right</span>
</div>
<div>
<p class="font-h3 text-h3 text-on-surface">350m</p>
<p class="font-body-sm text-body-sm text-outline">Gira a la derecha en Av. Reforma</p>
</div>
</div>
</div>
<!-- Floating Progress Indicator -->
<div class="absolute top-28 right-5">
<div class="bg-surface-container-lowest rounded-lg p-3 shadow-sm border border-outline-variant flex flex-col items-center">
<p class="font-label-caps text-label-caps text-outline mb-1">PROGRESO</p>
<div class="relative w-12 h-12 flex items-center justify-center">
<svg class="w-full h-full -rotate-90">
<circle class="text-surface-container-highest" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-secondary" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-dasharray="125.6" stroke-dashoffset="83.7" stroke-width="4"></circle>
</svg>
<span class="absolute font-h3 text-h3">4<span class="text-xs text-outline">/12</span></span>
</div>
</div>
</div>
</div>
<!-- Floating Student Card (Action Focus) -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-lg z-10">
<div class="bg-surface-container-lowest rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-outline-variant p-6">
<div class="flex justify-between items-start mb-6">
<div class="flex gap-4">
<div class="w-16 h-16 rounded-full overflow-hidden border-2 border-secondary-container">
<img class="w-full h-full object-cover" data-alt="Close up portrait of a young student with a friendly expression, high-key lighting, wearing a simple school sweater. The background is a soft, out-of-focus classroom environment. The image is clean and professional, using a neutral color palette with teal accents to match the corporate safety app aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaUmde7O7GwfLsDaNuEx4SlQUgUgutW5fFMw_jHojk2Gyl7o_e3s89CUM4YdtwbUpILX-dVpG7xutETy0ijLEgJByUn8vd0i5Inds7H93oMoTU5zmx4JiTdJVcOD_MVBYoN0Mj-UROxtLwNEDJIyT9Amcey-oLGoTlcU9AJo3aaAOV6kYjp1cmSGVHOVqtrxVzMZBhv6GAeN6tX9pUYH0FuK6gTzwGo_WiFs1IiAejTdJpxyoUGtlFj7XnRIbMQa8cB2jjrwyj9hmq"/>
</div>
<div>
<p class="font-label-caps text-label-caps text-secondary mb-1">PRÓXIMA PARADA</p>
<h2 class="font-h2 text-h2 text-on-surface">Mateo Jiménez</h2>
<div class="flex items-center gap-1 text-outline">
<span class="material-symbols-outlined text-sm" data-icon="location_on">location_on</span>
<p class="font-body-sm text-body-sm">Calle Roble #142, Col. Arcos</p>
</div>
</div>
</div>
<div class="text-right">
<p class="font-h3 text-h3 text-on-surface">07:15</p>
<p class="font-label-caps text-label-caps text-outline">ESTIMADO</p>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-14 rounded-xl border-2 border-primary text-primary font-h3 transition-all hover:bg-surface-container-low active:scale-95">
<span class="material-symbols-outlined" data-icon="call">call</span>
                        Llamar
                    </button>
<button class="flex items-center justify-center gap-2 h-14 rounded-xl bg-secondary text-white font-h3 transition-all hover:opacity-90 active:scale-95 shadow-md">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Recogido
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-3 pb-safe bg-white/95 border-t border-slate-200 shadow-[0_-4px_20px_rgba(0,0,0,0.04)] z-50 rounded-t-2xl">
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-teal-500 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="text-[11px] font-medium tracking-wide uppercase mt-1">Inicio</span>
</button>
<button class="flex flex-col items-center justify-center text-teal-600 font-bold scale-105 transition-transform">
<span class="material-symbols-outlined" data-icon="directions_bus" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
<span class="text-[11px] font-medium tracking-wide uppercase mt-1">Ruta</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-teal-500 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="text-[11px] font-medium tracking-wide uppercase mt-1">Estudiantes</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-teal-500 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="text-[11px] font-medium tracking-wide uppercase mt-1">Alertas</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 hover:text-teal-500 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[11px] font-medium tracking-wide uppercase mt-1">Perfil</span>
</button>
</nav>
<!-- Extra Space for Bottom Nav -->
<div class="h-20 w-full shrink-0"></div>
</body></html>
