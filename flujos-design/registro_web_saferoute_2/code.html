<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eceef0",
                        "surface": "#f7f9fb",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary-container": "#0d1c2f",
                        "surface-bright": "#f7f9fb",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary-fixed-variant": "#005049",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#d5e3fd",
                        "surface-tint": "#565e74",
                        "surface-dim": "#d8dadc",
                        "primary": "#000000",
                        "on-tertiary-fixed": "#0d1c2f",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#76859b",
                        "secondary-fixed-dim": "#6bd8cb",
                        "tertiary-fixed-dim": "#b9c7e0",
                        "surface-variant": "#e0e3e5",
                        "surface-container-high": "#e6e8ea",
                        "primary-fixed": "#dae2fd",
                        "primary-container": "#131b2e",
                        "inverse-primary": "#bec6e0",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#3a485c",
                        "on-primary-fixed": "#131b2e",
                        "background": "#f7f9fb",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#00201d",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "outline-variant": "#c6c6cd",
                        "primary-fixed-dim": "#bec6e0",
                        "inverse-surface": "#2d3133",
                        "error": "#ba1a1a",
                        "tertiary": "#000000",
                        "outline": "#76777d",
                        "on-secondary-container": "#006f66",
                        "on-primary-container": "#7c839b",
                        "on-surface": "#191c1e",
                        "secondary-fixed": "#89f5e7",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-surface-variant": "#45464d",
                        "on-background": "#191c1e",
                        "secondary-container": "#86f2e4",
                        "secondary": "#006a61"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "40px",
                        "sm": "12px",
                        "md": "24px",
                        "gutter": "16px",
                        "base": "8px",
                        "xl": "64px",
                        "container-padding": "20px"
                    },
                    "fontFamily": {
                        "h2": ["Inter"],
                        "label-caps": ["Inter"],
                        "h1": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "h3": ["Inter"]
                    },
                    "fontSize": {
                        "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "h3": ["18px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- TopNavBar Shell -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm dark:shadow-none docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center w-full px-8 py-4 max-w-screen-2xl mx-auto">
<div class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">SafeRoute</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-slate-600 dark:text-slate-400 font-['Inter'] text-sm font-medium tracking-tight hover:text-teal-500 dark:hover:text-teal-300 transition-colors duration-200" href="#">Soluciones</a>
<a class="text-slate-600 dark:text-slate-400 font-['Inter'] text-sm font-medium tracking-tight hover:text-teal-500 dark:hover:text-teal-300 transition-colors duration-200" href="#">Seguridad</a>
<a class="text-slate-600 dark:text-slate-400 font-['Inter'] text-sm font-medium tracking-tight hover:text-teal-500 dark:hover:text-teal-300 transition-colors duration-200" href="#">Flota</a>
<a class="text-slate-600 dark:text-slate-400 font-['Inter'] text-sm font-medium tracking-tight hover:text-teal-500 dark:hover:text-teal-300 transition-colors duration-200" href="#">Soporte</a>
</nav>
<div class="flex items-center">
<button class="text-teal-600 dark:text-teal-400 font-['Inter'] text-sm font-medium tracking-tight active:scale-95 transition-transform">Iniciar sesión</button>
</div>
</div>
</header>
<!-- Main Content: Registration Canvas -->
<main class="flex-grow flex items-center justify-center px-container-padding py-xl bg-surface">
<div class="w-full max-w-[580px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] p-md md:p-lg border border-outline-variant/30">
<!-- Header Section -->
<div class="text-center mb-md">
<h1 class="font-h1 text-h1 text-primary mb-xs">Únete a SafeRoute</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Experimenta la tranquilidad en cada viaje familiar.</p>
</div>
<form class="space-y-md">
<!-- Account Type Selection -->
<div class="space-y-sm">
<label class="font-label-caps text-label-caps text-outline uppercase">SELECCIONA EL TIPO DE CUENTA</label>
<div class="grid grid-cols-2 gap-md">
<label class="relative flex flex-col items-center p-md border border-outline-variant rounded-xl cursor-pointer hover:border-secondary transition-all group has-[:checked]:border-secondary has-[:checked]:bg-secondary-container/10">
<input checked="" class="hidden peer" name="account_type" type="radio"/>
<span class="material-symbols-outlined text-secondary text-[32px] mb-xs group-hover:scale-110 transition-transform" data-icon="family_restroom">family_restroom</span>
<span class="font-h3 text-h3 text-on-surface">Parent</span>
<span class="font-body-sm text-[12px] text-on-surface-variant text-center mt-1">Manage family safety</span>
<div class="absolute top-2 right-2 hidden peer-checked:block">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
<label class="relative flex flex-col items-center p-md border border-outline-variant rounded-xl cursor-pointer hover:border-secondary transition-all group has-[:checked]:border-secondary has-[:checked]:bg-secondary-container/10">
<input class="hidden peer" name="account_type" type="radio"/>
<span class="material-symbols-outlined text-secondary text-[32px] mb-xs group-hover:scale-110 transition-transform" data-icon="directions_car">directions_car</span>
<span class="font-h3 text-h3 text-on-surface">Conductor</span>
<span class="font-body-sm text-[12px] text-on-surface-variant text-center mt-1">Miembro de la flota con enfoque en seguridad</span>
<div class="absolute top-2 right-2 hidden peer-checked:block">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
</div>
</div>
<!-- Input Fields -->
<div class="grid grid-cols-1 gap-md">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-outline uppercase" for="full_name">NOMBRE COMPLETO</label>
<input class="w-full h-[48px] px-md rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-sm bg-surface-bright" id="full_name" placeholder="Ingresa tu nombre legal" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-outline uppercase" for="email">CORREO ELECTRÓNICO</label>
<input class="w-full h-[48px] px-md rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-sm bg-surface-bright" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-outline uppercase" for="password">CONTRASEÑA</label>
<input class="w-full h-[48px] px-md rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-sm bg-surface-bright" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-outline uppercase" for="confirm_password">CONFIRMAR CONTRASEÑA</label>
<input class="w-full h-[48px] px-md rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-sm bg-surface-bright" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-sm py-xs">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-secondary focus:ring-secondary" id="terms" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant leading-tight" for="terms">Acepto los <a class="text-secondary font-medium hover:underline" href="#">Términos de Servicio</a> y la <a class="text-secondary font-medium hover:underline" href="#">Política de Privacidad</a> respecto al manejo de datos y monitoreo de seguridad.</label>
</div>
<!-- Primary Action -->
<button class="w-full h-[48px] bg-secondary text-on-secondary rounded-lg font-h3 text-h3 hover:opacity-90 active:scale-[0.98] transition-all shadow-md" type="submit">Crear Cuenta</button>
</form>
<div class="mt-md pt-md border-t border-outline-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">¿Ya tienes una cuenta? <a class="text-secondary font-medium hover:underline" href="#">Inicia sesión</a></p>
</div>
</div>
</main>
<!-- Footer Shell -->
<footer class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 w-full mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-8 py-12 max-w-screen-2xl mx-auto gap-4">
<div class="flex flex-col gap-1">
<div class="text-lg font-semibold text-slate-800 dark:text-slate-200">SafeRoute</div>
<p class="font-['Inter'] text-xs text-slate-500 dark:text-slate-400">© 2024 SafeRoute Technologies. Secure journeys for every family.</p>
</div>
<div class="flex gap-6">
<a class="font-['Inter'] text-xs text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:underline transition-all duration-200" href="#">Política de Privacidad</a>
<a class="font-['Inter'] text-xs text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:underline transition-all duration-200" href="#">Términos de Servicio</a>
<a class="font-['Inter'] text-xs text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:underline transition-all duration-200" href="#">Cumplimiento</a>
<a class="font-['Inter'] text-xs text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:underline transition-all duration-200" href="#">Contacto</a>
</div>
</div>
</footer>
</body></html>
