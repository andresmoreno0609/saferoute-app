<!-- TopAppBar -->
<header class="bg-[#F8FAFC] dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between px-6 py-4 w-full fixed top-0 z-50">

</div>

<div class="w-full max-w-[480px]">
<!-- Login Card -->
<div class="bg-surface-container-lowest ambient-shadow rounded-xl p-lg border border-outline-variant/20">
<div class="text-center mb-lg">
<h2 class="font-h1 text-h1 text-on-surface mb-xs">SafeRoute</h2>
<p class="font-body-lg text-on-surface-variant">Bienvenido de nuevo</p>
</div>
<form class="space-y-gutter">
<!-- Email Input -->
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Correo Electrónico</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-secondary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full h-[48px] pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-lg font-body-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline/60" placeholder="correo@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Contraseña</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-secondary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full h-[48px] pl-12 pr-12 bg-surface-container-low border border-outline-variant rounded-lg font-body-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline/60" placeholder="Ingresa tu contraseña" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-body-sm text-secondary hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] bg-secondary text-on-secondary font-h3 text-h3 rounded-lg shadow-md hover:brightness-110 active:scale-[0.98] transition-all duration-200 mt-md" type="submit">
                        Iniciar Sesión
                    </button>
</form>
<!-- Redirect Link -->
<div class="mt-lg pt-gutter border-t border-outline-variant/30 text-center">
<p class="font-body-sm text-on-surface-variant">
                        ¿No tienes cuenta? 
                        <a class="text-secondary font-semibold hover:underline ml-1" href="#">Regístrate</a>
</p>
