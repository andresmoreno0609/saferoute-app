<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: linear-gradient(135deg, #F8FAFC 0%, #F1F5F9 100%);
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body-lg text-on-background min-h-screen flex flex-col">
<!-- TopAppBar suppression for transactional page as per mandate -->
<main class="flex-grow flex items-center justify-center px-container-padding py-xl bg-login-gradient">
<div class="w-full max-w-md">
<!-- Branding & Header Section -->
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-white shadow-sm border border-outline-variant mb-md">
<span class="material-symbols-outlined text-[40px] text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
<h1 class="font-h1 text-h1 text-primary-container mb-xs">Bienvenido de nuevo</h1>
<p class="font-body-sm text-body-sm text-on-primary-container">Ingresa a tu cuenta para continuar</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-md rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-white">
<form action="#" class="space-y-gutter">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-primary-fixed-variant block ml-1" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-on-secondary-container transition-colors">mail</span>
</div>
<input class="w-full h-12 pl-10 pr-4 bg-surface border border-outline-variant rounded-lg font-body-sm focus:ring-2 focus:ring-on-secondary-container/20 focus:border-on-secondary-container transition-all outline-none" id="email" name="email" placeholder="ejemplo@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-primary-fixed-variant block ml-1" for="password">Contraseña</label>
<a class="font-label-caps text-label-caps text-on-secondary-container hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-on-secondary-container transition-colors">lock</span>
</div>
<input class="w-full h-12 pl-10 pr-12 bg-surface border border-outline-variant rounded-lg font-body-sm focus:ring-2 focus:ring-on-secondary-container/20 focus:border-on-secondary-container transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-on-secondary-container text-on-primary font-h3 text-h3 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Iniciar Sesión
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-caps">
<span class="px-2 bg-surface-container-lowest text-on-tertiary-container font-label-caps uppercase">O accede con</span>
</div>
</div>
<!-- Social Login Cluster -->
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center h-12 px-4 border border-outline-variant rounded-lg bg-white hover:bg-surface-container-low transition-colors group">
<img alt="Google" class="w-5 h-5 mr-3" data-alt="A clean, high-resolution graphic of the Google G logo icon on a pure white background. The logo features its signature four-color scheme of blue, red, yellow, and green in a minimalist digital vector style. The surrounding space is filled with soft, diffused light consistent with a premium mobile application interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKYyrO7qG0CyzH0n0ESQuiWvyqEwBL7hXTJFbucsoqdawa-8MXTdcgWQ6rT-yEc1ITU8sLi-EPRt1OOOtsksBMTJTq8K792hcilvn3jsH9EjETq1K40GQuziq-72ZVwrh7OHGpoa010LxoYCDsW3hCpIpTO8ugDp5iZosPG6aZrcME3jxadUM_0zFbBqqeCSmLSxnCKdbGO05fAElvGAioNyvyevT3r6dcAO3GOTOu3MmSJg6y0KmrgAspf4NX0rcoc0qlXpoSExYh"/>
<span class="font-body-sm font-medium text-primary-container">Google</span>
</button>
<button class="flex items-center justify-center h-12 px-4 border border-outline-variant rounded-lg bg-white hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-2xl mr-3 text-primary-container" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-body-sm font-medium text-primary-container">Apple</span>
</button>
</div>
</div>
<!-- Registration Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-on-primary-container">
                    ¿No tienes cuenta? 
                    <a class="text-on-secondary-container font-semibold hover:underline" href="#">Regístrate</a>
</p>
</div>
</div>
</main>
<!-- Footer Security Message -->
<footer class="py-md px-container-padding text-center">
<div class="flex items-center justify-center gap-2 text-on-tertiary-container">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="font-label-caps text-[10px] uppercase tracking-widest">Conexión Segura Encriptada de SafeRoute</span>
</div>
</footer>
